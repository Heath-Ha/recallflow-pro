<!-- ========== Recall Flow Pro (무제한 버전) ========== -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="과학적인 Leitner 시스템 기반 플래시카드 암기 앱">
    <meta name="theme-color" content="#667eea">
    <title>Recall Flow Pro - 메인</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Recall Flow">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container" id="app">
        <!-- 네비게이션은 JS로 삽입 -->
    </div>

    <script src="shared.js"></script>
    <script>
        // 라이선스 체크
        if (!checkLicenseOnLoad()) {
            // 라이선스 실패 시 shared.js에서 처리
        } else {
            init();
        }

        function init() {
            // 네비게이션 추가
            const container = document.getElementById('app');
            container.insertBefore(createNavbar('index'), container.firstChild);

            // 데이터 로드
            const data = RecallFlow.loadData();
            const stats = RecallFlow.getStats(data);
            
            // 현재 덱 정보
            const currentDeck = DeckManager.getCurrentDeck();
            const deckInfo = DeckManager.getDeckInfo(currentDeck);

            // 메인 화면 렌더링
            renderDashboard(stats, deckInfo);
        }

        function renderDashboard(stats, deckInfo) {
            const deckName = deckInfo ? deckInfo.displayName : '기본 덱';
            
            const mainContent = document.createElement('div');
            mainContent.className = 'main-content';
            mainContent.innerHTML = `
                <div style="text-align: center; padding: 40px 0;">
                    <h1 style="font-size: 48px; margin-bottom: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
                        <span style="color: #ff69b4;">🧠</span> Recall Flow Pro
                    </h1>
                    <p style="font-size: 20px; color: #718096; margin-bottom: 10px;">
                        즉각 반복 암기 시스템
                    </p>
                    <p style="font-size: 16px; color: #667eea; font-weight: bold;">
                        📚 현재 덱: ${deckName}
                    </p>
                </div>

                <div class="stats" style="justify-content: center; margin-bottom: 40px;">
                    <div class="stat-item">
                        <div style="font-size: 14px; opacity: 0.9;">전체 카드</div>
                        <div style="font-size: 32px; font-weight: bold; margin-top: 5px;">${stats.totalCards}</div>
                    </div>
                    <div class="stat-item" style="background: #48bb78;">
                        <div style="font-size: 14px; opacity: 0.9;">완전 암기</div>
                        <div style="font-size: 32px; font-weight: bold; margin-top: 5px;">${stats.masteredCount}</div>
                    </div>
                    <div class="stat-item" style="background: #f6ad55;">
                        <div style="font-size: 14px; opacity: 0.9;">학습 중</div>
                        <div style="font-size: 32px; font-weight: bold; margin-top: 5px;">
                            ${stats.stage1Count + stats.stage2Count + stats.stage3Count + stats.box1Count + stats.box2Count + stats.box3Count + stats.box4Count}
                        </div>
                    </div>
                    <div class="stat-item" style="background: #ed8936;">
                        <div style="font-size: 14px; opacity: 0.9;">대기 중</div>
                        <div style="font-size: 32px; font-weight: bold; margin-top: 5px;">${stats.backlogCount}</div>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px;">
                    <div class="card">
                        <h3 style="margin-bottom: 15px; color: #667eea;">📖 학습 진행</h3>
                        <div style="margin-bottom: 10px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <span>1단 윗줄</span>
                                <span><strong>${stats.stage1Count}</strong> / 5</span>
                            </div>
                            <div style="background: #e2e8f0; height: 8px; border-radius: 4px; overflow: hidden;">
                                <div style="background: #667eea; height: 100%; width: ${(stats.stage1Count / 5) * 100}%;"></div>
                            </div>
                        </div>
                        <div style="margin-bottom: 10px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <span>2단 윗줄</span>
                                <span><strong>${stats.stage2Count}</strong> / 5</span>
                            </div>
                            <div style="background: #e2e8f0; height: 8px; border-radius: 4px; overflow: hidden;">
                                <div style="background: #667eea; height: 100%; width: ${(stats.stage2Count / 5) * 100}%;"></div>
                            </div>
                        </div>
                        <div style="margin-bottom: 10px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                                <span>3단 윗줄</span>
                                <span><strong>${stats.stage3Count}</strong> / 7</span>
                            </div>
                            <div style="background: #e2e8f0; height: 8px; border-radius: 4px; overflow: hidden;">
                                <div style="background: #667eea; height: 100%; width: ${(stats.stage3Count / 7) * 100}%;"></div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h3 style="margin-bottom: 15px; color: #764ba2;">📦 상자 시스템</h3>
                        <div style="margin-bottom: 8px; display: flex; justify-content: space-between;">
                            <span>1단 상자</span>
                            <span><strong>${stats.box1Count}</strong></span>
                        </div>
                        <div style="margin-bottom: 8px; display: flex; justify-content: space-between;">
                            <span>2단 상자</span>
                            <span><strong>${stats.box2Count}</strong></span>
                        </div>
                        <div style="margin-bottom: 8px; display: flex; justify-content: space-between;">
                            <span>3단 상자</span>
                            <span><strong>${stats.box3Count}</strong></span>
                        </div>
                        <div style="margin-bottom: 8px; display: flex; justify-content: space-between;">
                            <span>4단 상자</span>
                            <strong>${stats.box4Count}</strong>
                        </div>
                    </div>

                    <div class="card">
                        <h3 style="margin-bottom: 15px; color: #48bb78;">✨ 빠른 시작</h3>
                        <p style="color: #718096; margin-bottom: 20px;">
                            ${stats.backlogCount > 0 ? '학습을 시작할 준비가 되었습니다!' : '카드를 추가하여 학습을 시작하세요.'}
                        </p>
                        <a href="${stats.backlogCount > 0 ? 'study.html' : 'settings.html'}" class="btn btn-primary" style="display: block; text-align: center; text-decoration: none;">
                            ${stats.backlogCount > 0 ? '🚀 학습 시작' : '➕ 카드 추가하기'}
                        </a>
                    </div>
                </div>

                <div style="text-align: center; color: #a0aec0; font-size: 14px;">
                    <p>💡 Tip: 하루 10분씩 꾸준히 학습하면 놀라운 결과를 얻을 수 있습니다!</p>
                </div>
            `;

            document.getElementById('app').appendChild(mainContent);
        }
        
        // PWA Service Worker 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered:', reg))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
